name: Build and Release Windows Binaries

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            cmake_arch: x64
          - arch: x86
            cmake_arch: Win32
          - arch: arm64
            cmake_arch: ARM64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build-${{ matrix.arch }} -G "Visual Studio 17 2022" -A ${{ matrix.cmake_arch }}

      - name: Build Release
        run: cmake --build build-${{ matrix.arch }} --config Release

      - name: Package
        shell: pwsh
        run: |
          $artifactName = "cpp_dynamic_island-windows-${{ matrix.arch }}"
          $outputDir = "dist"
          New-Item -ItemType Directory -Path $outputDir -Force | Out-Null
          Copy-Item "build-${{ matrix.arch }}/Release/cpp_dynamic_island.exe" "$outputDir/cpp_dynamic_island.exe"
          Compress-Archive -Path "$outputDir/cpp_dynamic_island.exe" -DestinationPath "$artifactName.zip" -Force

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: cpp_dynamic_island-windows-${{ matrix.arch }}
          path: cpp_dynamic_island-windows-${{ matrix.arch }}.zip

  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            release-assets/cpp_dynamic_island-windows-x64/cpp_dynamic_island-windows-x64.zip
            release-assets/cpp_dynamic_island-windows-x86/cpp_dynamic_island-windows-x86.zip
            release-assets/cpp_dynamic_island-windows-arm64/cpp_dynamic_island-windows-arm64.zip
